<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎮 Tic-Tac-Toe AI</h1>

        <div class="controls">
            <label for="difficulty">Difficulty: </label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard" selected>Hard (Unbeatable)</option>
            </select>
        </div>

        <div id="scoreboard">
            <span id="score-player" class="score-text">Player: 0</span> | 
            <span id="score-draw" class="score-text">Draws: 0</span> | 
            <span id="score-ai" class="score-text">AI: 0</span>
        </div>

        <div id="status">Your Turn (X)</div>

        <div class="board-container">
            <svg id="winLine" class="win-line">
                <line id="line" x1="0" y1="0" x2="0" y2="0" />
            </svg>

            <div id="board" class="board"></div>
        </div>

        <button onclick="restartGame()">
            🔄 Restart Game
        </button>
    </div>

    <script src="script.js"></script>

</body>
</html>
